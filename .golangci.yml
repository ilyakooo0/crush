version: "2"
linters:
  enable:
    - bodyclose
    - errcheck
    # - exhaustive
    # - goconst
    # - godot
    # - godox
    # - gomoddirectives
    - goprintffuncname
    # - gosec
    - ineffassign
    - misspell
    # - nakedret
    # - nestif
    # - nilerr
    - noctx
    - nolintlint
    # - prealloc
    # - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tparallel
    # - unconvert
    # - unparam
    - unused
    - whitespace
    # - wrapcheck
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      # Ignores the idiomatic-to-drop error family (*Close, *Flush,
      # Fprint*, os.Remove/RemoveAll, os.Setenv, stdout/stderr writes) so
      # errcheck only flags genuinely meaningful dropped errors.
      - std-error-handling
    rules:
      # Dropped errors in tests (setup writes, httptest encoders) are
      # low-signal — test failures surface them anyway.
      - path: _test\.go
        linters:
          - errcheck
      - text: '(slog|log)\.\w+'
        linters:
          - noctx
      - path: internal/shell/run.go
        text: "SA1019.*interp.ExecHandler"
        linters:
          - staticcheck
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
